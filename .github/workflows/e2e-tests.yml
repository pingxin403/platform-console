name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual trigger

jobs:
  e2e-tests:
    name: Run E2E User Journey Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        # Run tests on multiple browsers
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build:all
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start backend
        run: |
          yarn start backend &
          # Wait for backend to be ready
          timeout 120 bash -c 'until curl -f http://localhost:7007/healthcheck; do sleep 2; done'
        env:
          NODE_ENV: test
          LOG_LEVEL: warn

      - name: Start frontend
        run: |
          yarn start app &
          # Wait for frontend to be ready
          timeout 120 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'
        env:
          NODE_ENV: test

      - name: Run E2E tests
        run: yarn test:e2e --project=${{ matrix.browser }}
        env:
          CI: true
          PLAYWRIGHT_URL: http://localhost:3000
          BACKEND_URL: http://localhost:7007

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ matrix.browser }}
          path: |
            e2e-test-report/
            node_modules/.cache/e2e-test-results/
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ matrix.browser }}
          path: screenshots/
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          pkill -f "yarn start backend" || true
          pkill -f "yarn start app" || true

  report:
    name: Generate Test Report
    needs: e2e-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-test-results-*
          path: test-results

      - name: Publish test report
        uses: actions/upload-artifact@v4
        with:
          name: combined-e2e-report
          path: test-results/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // This is a placeholder - you would parse actual test results
            const comment = `## E2E Test Results
            
            ✅ E2E tests completed. Check the artifacts for detailed results.
            
            - [View Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
