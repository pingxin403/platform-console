name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        id: npm-audit
        run: |
          npm audit --audit-level=moderate || echo "AUDIT_FAILED=true" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Run security scan script
        run: |
          chmod +x scripts/security-scan.sh
          CI=true ./scripts/security-scan.sh
        continue-on-error: true
      
      - name: Check for sensitive data
        run: |
          echo "Checking for potential secrets in code..."
          
          # Check for hardcoded passwords
          if git grep -i "password.*=.*['\"]" -- '*.ts' '*.js' '*.tsx' '*.jsx' | grep -v "test" | grep -v "example" | grep -v "placeholder"; then
            echo "::error::Potential hardcoded passwords found"
            exit 1
          fi
          
          # Check for hardcoded API keys
          if git grep -i "api[_-]key.*=.*['\"]" -- '*.ts' '*.js' '*.tsx' '*.jsx' | grep -v "test" | grep -v "example" | grep -v "placeholder"; then
            echo "::error::Potential hardcoded API keys found"
            exit 1
          fi
          
          echo "No sensitive data found in code"
      
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_number }}
          path: security-report-*.txt
          retention-days: 30
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request' && steps.npm-audit.outputs.AUDIT_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Security Scan Warning**\n\nVulnerabilities were found during the security scan. Please review the audit results and fix any moderate or higher severity issues.\n\nRun `npm audit` locally to see details.'
            })
  
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0, GPL-3.0
  
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
